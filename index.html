<!DOCTYPE html>
<html>
<head>

<title>Land of shit</title>

<style>

* {
    box-sizing:border-box;
}


body {

    margin:0;
    background:black;
    color:white;
    font-family:"Courier New", monospace;

}



#chat {

    margin:10px;
    font-size:16px;

}


.message {

    margin-bottom:5px;
    color:white;
    line-height:16px;

}



/* PC terminal input */

#inputArea {

    margin-left:10px;
    margin-top:0;
    display:flex;
    align-items:center;

}



#terminalText {

    font-size:16px;
    white-space:pre;

}



#cursor {

    font-size:16px;
    width:6px;
    display:inline-block;
    animation:blink 1s infinite;

}



@keyframes blink {

    50% {
        opacity:0;
    }

}




/* Hidden PC input */

#hiddenInput {

    position:absolute;
    opacity:0;

}



/* Mobile input */

#mobileInputArea {

    display:none;

}




/* Clear button */

#clearButton {

    display:none;

    position:fixed;

    top:10px;

    right:10px;

    width:40px;

    height:40px;

    background:red;

    border:none;

    padding:8px;

}



#clearButton img {

    width:100%;

    height:100%;

    filter:brightness(0);

    image-rendering:pixelated;

}





/* PHONE */

@media(max-width:600px){


    body {

        padding-bottom:70px;

    }



    #inputArea {

        display:none;

    }



    #mobileInputArea {


        display:flex;


        position:fixed;


        bottom:15px;


        left:15px;


        right:15px;


        height:45px;


        border:3px solid white;


        background:black;


    }



    #mobileInput {


        flex:1;


        background:black;


        border:none;


        outline:none;


        color:white;


        font-family:"Courier New", monospace;


        font-size:18px;


        padding-left:10px;


    }



    #sendButton {


        width:45px;


        background:white;


        color:black;


        border:none;


        font-size:22px;


    }


}



</style>



<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>


</head>


<body>



<button id="clearButton">

<img src="https://www.svgrepo.com/show/335463/trash.svg">

</button>



<div id="chat"></div>




<!-- PC -->

<div id="inputArea">

<span id="terminalText"></span><span id="cursor">|</span>

<input id="hiddenInput">

</div>



<!-- MOBILE -->

<div id="mobileInputArea">

<input id="mobileInput" placeholder="">

<button id="sendButton">↩</button>

</div>






<script>


const firebaseConfig = {


apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",

authDomain: "jacob-chat.firebaseapp.com",

databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",

projectId: "jacob-chat",

storageBucket: "jacob-chat.firebasestorage.app",

messagingSenderId: "554355410181",

appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"

};



firebase.initializeApp(firebaseConfig);


const database=firebase.database();



const chat=document.getElementById("chat");

const hiddenInput=document.getElementById("hiddenInput");

const mobileInput=document.getElementById("mobileInput");

const terminalText=document.getElementById("terminalText");

const clearButton=document.getElementById("clearButton");

const sendButton=document.getElementById("sendButton");



let verified=false;

let currentText="";






const typeSound=new Audio(
"https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
);


const sendSound=new Audio(
"https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"
);





function playType(){

typeSound.currentTime=0;
typeSound.play().catch(()=>{});

}


function playSend(){

sendSound.currentTime=0;
sendSound.play().catch(()=>{});

}






function sendMessage(text){


text=text.trim();


if(text==="") return;




if(text==="?verify"){


verified=true;

clearButton.style.display="block";

return;

}



database.ref("messages").push({

text:text,

time:Date.now()

});


playSend();


}







// PC typing


hiddenInput.addEventListener("input",function(){


currentText=hiddenInput.value;


terminalText.textContent=currentText;


playType();


});



hiddenInput.addEventListener("keydown",function(e){


if(e.key==="Enter"){


sendMessage(currentText);


currentText="";

hiddenInput.value="";

terminalText.textContent="";


}


});







// Mobile typing


mobileInput.addEventListener("keydown",function(e){


if(e.key==="Enter"){


sendMessage(mobileInput.value);


mobileInput.value="";


}


});



sendButton.onclick=function(){


sendMessage(mobileInput.value);


mobileInput.value="";


};








// focus PC


document.onclick=function(){

if(window.innerWidth>600){

hiddenInput.focus();

}

};







// clear messages


clearButton.onclick=function(){


if(!verified)return;


database.ref("messages").remove();


chat.innerHTML="";


clearButton.style.display="none";


};







// receive


database.ref("messages")

.on("child_added",function(snapshot){


let data=snapshot.val();


let message=document.createElement("div");


message.className="message";


message.textContent=data.text;


chat.appendChild(message);


window.scrollTo(0,document.body.scrollHeight);


});



</script>


</body>
</html>
