<!DOCTYPE html>
<html>
<head>
<title>Land of shit</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

#chat{
    margin:10px;
    font-size:16px;
}

.message{
    color:white;
    margin-bottom:5px;
    line-height:16px;
}

/* PC terminal */
#inputArea{
    margin-left:10px;
    height:16px;
    display:flex;
    align-items:center;
}

#terminalText{
    font-size:16px;
    white-space:pre;
}

#cursor{
    font-size:16px;
    width:6px;
    display:inline-block;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

#hiddenInput{
    position:absolute;
    opacity:0;
}


/* Verify button */

#clearButton{
    display:none;
    position:fixed;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    background:red;
    border:0;
    padding:8px;
    z-index:10;
}

#clearButton img{
    width:100%;
    height:100%;
    filter:brightness(0);
    image-rendering:pixelated;
}


/* Mobile */

#mobileInputArea{
    display:none;
}


@media(max-width:600px){

    html,body{
        height:100dvh;
    }

    #chat{
        height:calc(100dvh - 70px);
        overflow-y:auto;
        margin:10px;
    }


    #inputArea{
        display:none;
    }


    #mobileInputArea{
        display:flex;
        position:fixed;
        bottom:10px;
        left:10px;
        right:10px;
        height:45px;
        border:3px solid white;
        background:black;
        z-index:5;
    }


    #mobileInput{
        flex:1;
        background:black;
        border:0;
        outline:0;
        color:white;
        font-family:"Courier New",monospace;
        font-size:18px;
        padding-left:10px;
    }


    #sendButton{
        width:45px;
        background:white;
        color:black;
        border:0;
        font-size:22px;
    }

}

</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>

<body>


<button id="clearButton">
<img src="https://www.svgrepo.com/show/335463/trash.svg">
</button>


<div id="chat"></div>


<!-- PC -->

<div id="inputArea">
<span id="terminalText"></span><span id="cursor">|</span>
<input id="hiddenInput">
</div>


<!-- MOBILE -->

<div id="mobileInputArea">
<input id="mobileInput">
<button id="sendButton">↩</button>
</div>



<script>

const firebaseConfig={
apiKey:"AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain:"jacob-chat.firebaseapp.com",
databaseURL:"https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"jacob-chat",
storageBucket:"jacob-chat.firebasestorage.app",
messagingSenderId:"554355410181",
appId:"1:554355410181:web:250c29e43f29cfb8b4e36c"
};


firebase.initializeApp(firebaseConfig);

const database=firebase.database();


const chat=document.getElementById("chat");

const hiddenInput=document.getElementById("hiddenInput");
const mobileInput=document.getElementById("mobileInput");

const terminalText=document.getElementById("terminalText");

const clearButton=document.getElementById("clearButton");
const sendButton=document.getElementById("sendButton");


let currentText="";
let verified=false;



const typeSound=new Audio(
"https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
);


const sendSound=new Audio(
"https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"
);



function sendMessage(text){

    text=text.trim();

    if(text==="")return;


    if(text=="?verify"){

        verified=true;

        clearButton.style.display="block";

        return;
    }


    database.ref("messages").push({
        text:text,
        time:Date.now()
    });


    sendSound.currentTime=0;
    sendSound.play().catch(()=>{});

}



hiddenInput.addEventListener("input",()=>{

    currentText=hiddenInput.value;

    terminalText.textContent=currentText;

    typeSound.currentTime=0;
    typeSound.play().catch(()=>{});

});



hiddenInput.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        sendMessage(currentText);

        currentText="";
        hiddenInput.value="";
        terminalText.textContent="";
    }

});



mobileInput.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        sendMessage(mobileInput.value);

        mobileInput.value="";
    }

});


sendButton.onclick=()=>{

    sendMessage(mobileInput.value);

    mobileInput.value="";

};



document.onclick=()=>{

    if(window.innerWidth>600){

        hiddenInput.focus();

    }

};



clearButton.onclick=()=>{

    if(!verified)return;

    database.ref("messages").remove();

    chat.innerHTML="";

    clearButton.style.display="none";

};



database.ref("messages").on("child_added",(snap)=>{

    let data=snap.val();

    let msg=document.createElement("div");

    msg.className="message";

    msg.textContent=data.text;

    chat.appendChild(msg);

    chat.scrollTop=chat.scrollHeight;

});

</script>


</body>
</html>
