<!DOCTYPE html>
<html>
<head>

<title>Terminal Chatroom</title>

<style>

* {
    box-sizing:border-box;
}


body {

    margin:0;

    background:black;

    color:white;

    font-family:"Courier New", monospace;

    min-height:100vh;

}



#chat {

    margin:10px;

    font-size:16px;

}



.message {

    margin-bottom:5px;

    color:white;

}



/* Typing line */

#inputArea {

    margin:10px;

    display:flex;

    align-items:center;

    color:white;

    font-size:16px;

}



#terminalText {

    color:white;

    font-size:16px;

    white-space:pre;

}



#cursor {

    color:white;

    font-size:16px;

    font-weight:normal;

    width:8px;

    display:inline-block;

    animation:blink 1s infinite;

}



@keyframes blink {

    50% {

        opacity:0;

    }

}




/* Hidden input */

#hiddenInput {

    position:absolute;

    opacity:0;

    pointer-events:none;

}



/* Mobile */

@media(max-width:600px){


    body {

        padding-bottom:80px;

    }



    #inputArea {

        position:fixed;

        bottom:15px;

        left:15px;

        right:15px;

        height:45px;

        margin:0;

        border:3px solid white;

        background:black;

        padding-left:10px;

        font-size:18px;

    }



    #terminalText,
    #cursor {

        font-size:18px;

    }


}


</style>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>


</head>


<body>


<div id="chat"></div>



<div id="inputArea">

<span id="terminalText"></span><span id="cursor">|</span>

<input id="hiddenInput" autocomplete="off">


</div>




<script>


// FIREBASE

const firebaseConfig = {

apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",

authDomain: "jacob-chat.firebaseapp.com",

databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",

projectId: "jacob-chat",

storageBucket: "jacob-chat.firebasestorage.app",

messagingSenderId: "554355410181",

appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"

};



firebase.initializeApp(firebaseConfig);


const database = firebase.database();



const chat = document.getElementById("chat");

const hiddenInput = document.getElementById("hiddenInput");

const terminalText = document.getElementById("terminalText");



let currentText = "";




// Sounds

const typeSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
);


const sendSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"
);



function playType(){

    typeSound.currentTime = 0;

    typeSound.play().catch(()=>{});

}



function playSend(){

    sendSound.currentTime = 0;

    sendSound.play().catch(()=>{});

}




// Keep focus

function focusInput(){

    hiddenInput.focus();

}



window.onload = function(){

    focusInput();

};



document.onclick = function(){

    focusInput();

};







// Typing

hiddenInput.addEventListener("input", function(){


    let oldText = currentText;


    currentText = hiddenInput.value;


    terminalText.textContent = currentText;



    if(currentText.length > oldText.length){

        playType();

    }


});







// Send

hiddenInput.addEventListener("keydown", function(e){


    if(e.key === "Enter"){


        let text = currentText.trim();



        if(text !== ""){


            database.ref("messages").push({

                text:text,

                time:Date.now()

            });



            playSend();

        }



        currentText = "";

        hiddenInput.value = "";

        terminalText.textContent = "";


    }


});







// Receive messages

database.ref("messages")

.on("child_added", function(snapshot){


    let data = snapshot.val();



    let message = document.createElement("div");


    message.className="message";


    message.textContent=data.text;


    chat.appendChild(message);



    window.scrollTo(0, document.body.scrollHeight);



});



</script>


</body>
</html>
